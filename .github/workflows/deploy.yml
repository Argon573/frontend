name: Remote Auto-Deploy to Local Nginx

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: [ self-hosted, Linux, X64 ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to local Nginx directory
        run: |
          cp -r ./dist/* /home/akhowym/Документы/frontend/dist/
